<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeknikCRM</title>
    <link rel="icon" type="image/png" href="images/teknikcrmlogo.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet">
    <link href="css/custom.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:  '#eef2ff',
                            100: '#e0e7ff',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                        }
                    }
                }
            }
        };
    </script>
    <script>
        // Tema tercihini sayfa render'dan once uygula (flash onleme)
        (function() {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark-mode', 'dark');
            }
        })();
    </script>
</head>

<!-- ============================================================
     UST NAVIGASYON CUBUGU
     ============================================================ -->

                    <svg class="w-5 h-5 theme-icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

                ></span>
                <div class="relative">
                    <button
                        id="btn-user-menu"
                        type="button"
                        class="flex items-center gap-2 text-sm focus:outline-none"
                        aria-expanded="false"
                    >

                            id="user-avatar"
                            class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center text-white text-xs font-bold select-none"
                        >?</div>
                        <span id="nav-user-name" class="hidden sm:block text-sm font-medium text-gray-700"></span>
                    </button>

                    <!-- Dropdown -->
                    <div
                        id="user-dropdown"
                        class="hidden absolute right-0 mt-2 w-52 bg-white rounded-lg shadow-lg border border-gray-200 z-50"

                                    Profil Ayarlari
                                </a>
                            </li>
                            <li>
                                <a href="#" id="btn-signout" class="block px-4 py-2 hover:bg-gray-50 text-red-600 font-medium">
                                    Çıkış Yap
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
<script type="module" src="js/app.js"></script>
<script>
    // Tema toggle mantigi
    (function() {
        const btn = document.getElementById('btn-theme-toggle');
        const html = document.documentElement;
        const sunIcon = document.querySelector('.theme-icon-sun');
        const moonIcon = document.querySelector('.theme-icon-moon');

        function applyTheme(dark) {
            if (dark) {
                html.classList.add('dark-mode', 'dark');
                sunIcon?.classList.add('hidden');
                moonIcon?.classList.remove('hidden');
            } else {
                html.classList.remove('dark-mode', 'dark');
                sunIcon?.classList.remove('hidden');
                moonIcon?.classList.add('hidden');
            }
        }

        // Sayfa yuklendiginde mevcut duruma gore ikonlari ayarla
        applyTheme(html.classList.contains('dark-mode'));

        btn?.addEventListener('click', () => {
            const isDark = html.classList.toggle('dark-mode');
            html.classList.toggle('dark', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            applyTheme(isDark);
        });
    })();
</script>
